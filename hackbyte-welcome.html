<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23111827'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-size='28' fill='%23f8fafc' font-family='Arial'%3EHB%3C/text%3E%3C/svg%3E"
    />
    <title>Welcome HackByte 4.0 Hackers</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        color: #f8fafc;
        background: linear-gradient(135deg, #111827, #1e3a8a);
      }

      .welcome-card {
        width: min(90vw, 680px);
        padding: 48px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.5rem, 8vw, 5rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #dbeafe;
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <main class="welcome-card">
      <h1>Welcome Hackers</h1>
      <p>HackByte 4.0 is ready for builders, breakers, and bold ideas.</p>
    </main>
  </body>
</html>
